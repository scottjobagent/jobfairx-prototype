<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In - JobFairX</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: #f8f8f8; color: #2d2d2d; min-height: 100vh; display: flex; flex-direction: column; align-items: center; -webkit-font-smoothing: antialiased; }

.logo { margin-top: 48px; margin-bottom: 32px; font-size: 28px; font-weight: 800; color: #0044B3; letter-spacing: -0.5px; text-decoration: none; cursor: pointer; }

.login-card { background: #fff; border-radius: 12px; border: 1px solid #d4d2d0; padding: 40px 48px; width: 100%; max-width: 520px; position: relative; }

.login-close { position: absolute; top: 16px; right: 16px; width: 32px; height: 32px; border: none; background: none; cursor: pointer; color: #767676; font-size: 22px; display: flex; align-items: center; justify-content: center; border-radius: 4px; transition: background 0.15s; }
.login-close:hover { background: #f3f2ef; color: #2d2d2d; }

.login-card h1 { font-size: 22px; font-weight: 700; color: #2d2d2d; margin-bottom: 28px; }

.form-label { display: block; font-size: 14px; font-weight: 700; color: #2d2d2d; margin-bottom: 8px; }
.form-label .required { color: #dc2626; margin-left: 2px; }

.email-field { display: flex; align-items: center; border: 2px solid #d4d2d0; border-radius: 8px; padding: 0 16px; height: 52px; transition: border-color 0.15s; }
.email-field:focus-within { border-color: #0044B3; }
.email-field .email-icon { width: 20px; height: 20px; color: #767676; flex-shrink: 0; margin-right: 12px; }
.email-field input { flex: 1; border: none; outline: none; font-size: 16px; font-family: inherit; color: #2d2d2d; background: transparent; }
.email-field input::placeholder { color: #b0aeab; }

.btn-continue { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 16px; margin-top: 24px; background: #3366FF; color: #fff; border: none; border-radius: 8px; font-size: 17px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background 0.15s; }
.btn-continue:hover { background: #2952cc; }
.btn-continue svg { width: 18px; height: 18px; }

.sso-link { display: block; text-align: center; margin-top: 20px; font-size: 15px; font-weight: 600; color: #0044B3; text-decoration: none; cursor: pointer; }
.sso-link:hover { text-decoration: underline; }

.footer { margin-top: auto; padding: 32px 0; display: flex; align-items: center; gap: 8px; font-size: 14px; color: #767676; }
.footer a { color: #767676; text-decoration: none; }
.footer a:hover { color: #2d2d2d; text-decoration: underline; }
.footer .sep { color: #d4d2d0; }
</style>
</head>
<body>

<a class="logo" href="visual-v3.html">JobFairX</a>

<div class="login-card">
  <button class="login-close" onclick="window.location.href='visual-v3.html'">&times;</button>

  <h1>Sign in to your employer account.</h1>

  <label class="form-label">Email address <span class="required">*</span></label>
  <div class="email-field">
    <svg class="email-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 7L2 7"/></svg>
    <input type="email" placeholder="Enter your email" id="emailInput" value="">
  </div>

  <button class="btn-continue" onclick="window.location.href='visual-v3.html'">Continue <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg></button>

  <a class="sso-link">Or Sign In Using Microsoft</a>
</div>

<div class="footer">
  <a href="#">Home</a>
  <span class="sep">&middot;</span>
  <a href="#">Pricing</a>
  <span class="sep">&middot;</span>
  <a href="#">FAQ</a>
  <span class="sep">&middot;</span>
  <a href="#">Contact</a>
</div>

</body>
</html>
