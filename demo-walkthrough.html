<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobFairX Employer Dashboard — Walkthrough</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a1a;
            font-family: 'Noto Sans', sans-serif;
        }

        .walkthrough-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Scene Container */
        .scene {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        .scene.active {
            opacity: 1;
        }

        .scene img {
            max-width: 90%;
            max-height: 90%;
            width: auto;
            height: auto;
            object-fit: contain;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        /* Caption Bar */
        .caption-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            align-items: center;
            padding: 0 40px;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .caption-step {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            font-weight: 500;
            margin-right: 20px;
            white-space: nowrap;
            min-width: 50px;
        }

        .caption-text {
            color: #ffffff;
            font-size: 18px;
            font-weight: 400;
            line-height: 1.4;
            max-width: 800px;
        }

        /* Animated Cursor SVG */
        .cursor-svg {
            position: fixed;
            width: 24px;
            height: 32px;
            pointer-events: none;
            z-index: 200;
            opacity: 0;
            will-change: transform;
        }

        .cursor-svg.visible {
            opacity: 1;
        }

        /* Progress Bar */
        .progress-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            height: 4px;
            background: #0044B3;
            width: 0%;
            transition: width 0.3s ease-out;
            z-index: 50;
        }

        /* Outro Slide */
        .outro-slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #003d8a 0%, #002560 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        .outro-slide.active {
            opacity: 1;
        }

        .outro-content {
            text-align: center;
        }

        .outro-logo {
            font-size: 48px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .outro-text {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 30px;
        }

        .outro-cta {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 400;
        }

        /* Spacebar Hint */
        .spacebar-hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: rgba(255, 255, 255, 0.6);
            padding: 8px 14px;
            border-radius: 4px;
            font-size: 12px;
            z-index: 40;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .spacebar-hint.show {
            opacity: 1;
        }

        /* Cursor transitions */
        .cursor-svg {
            transition: none;
        }

        .cursor-svg.animating {
            transition: left 0.8s cubic-bezier(0.25, 0.1, 0.25, 1), top 0.8s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        @keyframes cursorClick {
            0% { transform: scale(1); }
            50% { transform: scale(0.8); }
            100% { transform: scale(1); }
        }

        .cursor-svg.clicking {
            animation: cursorClick 0.3s ease-out;
        }
    </style>
</head>
<body>
    <div class="walkthrough-container">
        <!-- Scenes -->
        <div class="scene active" data-scene="0">
            <img src="demo-screens/01-dashboard.png" alt="Dashboard Overview">
        </div>
        <div class="scene" data-scene="1">
            <img src="demo-screens/02-not-yet-interviewed.png" alt="Not Yet Interviewed">
        </div>
        <div class="scene" data-scene="2">
            <img src="demo-screens/03-schedule-modal.png" alt="Schedule Modal">
        </div>
        <div class="scene" data-scene="3">
            <img src="demo-screens/04-live-lobby.png" alt="Live Lobby">
        </div>
        <div class="scene" data-scene="4">
            <img src="demo-screens/05-interview-screen.png" alt="Interview Screen">
        </div>
        <div class="scene" data-scene="5">
            <img src="demo-screens/06-interview-resume.png" alt="Interview + Resume">
        </div>
        <div class="scene" data-scene="6">
            <img src="demo-screens/07-evaluation-modal.png" alt="Evaluation Modal">
        </div>
        <div class="scene" data-scene="7">
            <img src="demo-screens/08-interviewed-tab.png" alt="Interviewed Tab">
        </div>
        <div class="scene" data-scene="8">
            <img src="demo-screens/09-event-ended.png" alt="Event Ended Summary">
        </div>
        <div class="scene" data-scene="9">
            <img src="demo-screens/10-not-interviewed-post.png" alt="Not Interviewed Follow-up">
        </div>

        <!-- Outro Slide -->
        <div class="outro-slide" data-scene="10">
            <div class="outro-content">
                <div class="outro-logo">JobFairX</div>
                <div class="outro-text">Smarter Hiring Events</div>
                <div class="outro-cta">Learn more at jobfairx.com</div>
            </div>
        </div>

        <!-- Cursor SVG (macOS-style pointer) -->
        <svg class="cursor-svg" viewBox="0 0 28 36" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <filter id="cursor-shadow" x="-30%" y="-30%" width="160%" height="160%">
                    <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-opacity="0.35"/>
                </filter>
            </defs>
            <path d="M 4 0 L 4 26 L 9.5 20.5 L 14.5 30 L 18 28.5 L 13 19 L 20 19 Z"
                  fill="#ffffff" stroke="#000000" stroke-width="1.5" stroke-linejoin="round"
                  filter="url(#cursor-shadow)"/>
        </svg>

        <!-- Caption Bar -->
        <div class="caption-bar">
            <div class="caption-step"></div>
            <div class="caption-text"></div>
        </div>

        <!-- Progress Bar -->
        <div class="progress-bar"></div>

        <!-- Spacebar Hint -->
        <div class="spacebar-hint">Press spacebar to pause/resume</div>
    </div>

    <script>
        // Scene data: captions and cursor positions
        const scenes = [
            {
                caption: "Your hiring events at a glance — manage upcoming and completed events",
                cursorTarget: { x: 47, y: 42 }
            },
            {
                caption: "See candidates awaiting your response and schedule interviews",
                cursorTarget: { x: 85, y: 40 }
            },
            {
                caption: "Propose interview times and send a personalized message",
                cursorTarget: { x: 62, y: 72 }
            },
            {
                caption: "During the event — interview rooms fill automatically as candidates arrive",
                cursorTarget: { x: 82, y: 42 }
            },
            {
                caption: "Face-to-face video interviews with built-in tools",
                cursorTarget: { x: 88, y: 94 }
            },
            {
                caption: "Review the candidate's resume while you interview — no tab switching",
                cursorTarget: { x: 54, y: 94 }
            },
            {
                caption: "Quick feedback after each interview — Would you recommend moving forward?",
                cursorTarget: { x: 35, y: 40 }
            },
            {
                caption: "Track everyone you've interviewed with feedback and notes",
                cursorTarget: null
            },
            {
                caption: "After the event — review your hiring summary and next steps",
                cursorTarget: { x: 78, y: 28 }
            },
            {
                caption: "Follow up with candidates who couldn't make it — schedule or message them",
                cursorTarget: { x: 90, y: 52 }
            }
        ];

        // State
        let currentScene = 0;
        let isPlaying = true;
        let sceneTimeout = null;
        let cursorTimeout = null;

        const captionEl = document.querySelector('.caption-text');
        const captionStep = document.querySelector('.caption-step');
        const progressBar = document.querySelector('.progress-bar');
        const cursorSvg = document.querySelector('.cursor-svg');
        const spacebar = document.querySelector('.spacebar-hint');
        const walkthrough = document.querySelector('.walkthrough-container');

        // Initialize
        function init() {
            updateCaption();
            startScene();
            showSpacebarHint();
        }

        // Update caption
        function updateCaption() {
            if (currentScene < scenes.length) {
                captionStep.textContent = (currentScene + 1) + ' / ' + scenes.length;
                captionEl.textContent = scenes[currentScene].caption;
            } else {
                captionStep.textContent = '';
                captionEl.textContent = '';
            }
        }

        // Show/hide scenes
        function showScene(sceneNum) {
            document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.outro-slide').forEach(s => s.classList.remove('active'));

            if (sceneNum < scenes.length) {
                document.querySelector(`[data-scene="${sceneNum}"]`).classList.add('active');
            } else {
                document.querySelector(`[data-scene="10"]`).classList.add('active');
            }

            updateCaption();
            updateProgressBar();
        }

        // Update progress bar
        function updateProgressBar() {
            const totalScenes = 11; // 10 scenes + outro
            const progress = ((currentScene + 1) / totalScenes) * 100;
            progressBar.style.width = progress + '%';
        }

        // Start scene with cursor animation
        function startScene() {
            clearTimeout(sceneTimeout);
            clearTimeout(cursorTimeout);

            showScene(currentScene);
            hideCursor();

            if (currentScene < scenes.length) {
                const sceneData = scenes[currentScene];
                if (sceneData.cursorTarget) {
                    // Show cursor after 1s
                    cursorTimeout = setTimeout(() => {
                        animateCursor(sceneData.cursorTarget);
                    }, 1000);
                }
            }

            // Auto-advance after 5.5 seconds
            if (isPlaying) {
                sceneTimeout = setTimeout(nextScene, 5500);
            }
        }

        // Animate cursor movement
        function animateCursor(target) {
            const vw = window.innerWidth;
            const vh = window.innerHeight;

            // Calculate end position in pixels
            const endX = (target.x / 100) * vw;
            const endY = (target.y / 100) * vh;

            // Start from a natural position (lower-right area, like a real hand)
            const startX = endX + 180 + Math.random() * 100;
            const startY = endY + 120 + Math.random() * 80;

            // Place cursor at start position (no transition)
            cursorSvg.classList.remove('animating');
            cursorSvg.style.left = startX + 'px';
            cursorSvg.style.top = startY + 'px';

            // Show cursor
            requestAnimationFrame(() => {
                cursorSvg.classList.add('visible');

                // Start smooth movement after a brief pause
                requestAnimationFrame(() => {
                    cursorSvg.classList.add('animating');
                    cursorSvg.style.left = endX + 'px';
                    cursorSvg.style.top = endY + 'px';
                });
            });

            // Click animation after movement completes
            setTimeout(() => {
                cursorSvg.classList.add('clicking');
                setTimeout(() => {
                    cursorSvg.classList.remove('clicking');
                }, 300);
            }, 1100);
        }

        // Hide cursor
        function hideCursor() {
            cursorSvg.classList.remove('visible', 'moving', 'clicking');
        }

        // Navigation
        function nextScene() {
            currentScene++;
            if (currentScene > 10) {
                currentScene = 0;
                // Pause for 3s before restarting
                clearTimeout(sceneTimeout);
                isPlaying = false;
                setTimeout(() => {
                    isPlaying = true;
                    startScene();
                }, 3000);
            } else {
                startScene();
            }
        }

        function prevScene() {
            currentScene = Math.max(0, currentScene - 1);
            startScene();
        }

        // Pause/Play
        function togglePlayPause() {
            isPlaying = !isPlaying;
            clearTimeout(sceneTimeout);

            if (isPlaying) {
                sceneTimeout = setTimeout(nextScene, 5500);
            }
        }

        // Spacebar control
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                togglePlayPause();
                showSpacebarHint();
            }
        });

        // Show spacebar hint on interaction
        function showSpacebarHint() {
            spacebar.classList.add('show');
            clearTimeout(window.spacebarTimeout);
            window.spacebarTimeout = setTimeout(() => {
                spacebar.classList.remove('show');
            }, 3000);
        }

        // Keyboard navigation (hidden from user, for testing)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' && e.ctrlKey) nextScene();
            if (e.key === 'ArrowLeft' && e.ctrlKey) prevScene();
        });

        // Click to advance (disabled to avoid accidental clicks during recording)
        // walkthrough.addEventListener('click', () => {
        //     if (isPlaying) nextScene();
        // });

        // Start
        init();
    </script>
</body>
</html>
