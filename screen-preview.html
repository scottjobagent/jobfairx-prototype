  if(bgb&&pop)bgb.onclick=function(e){e.stopPropagation();pop.style.display=(pop.style.display==='block'?'none':'block');};
  root.querySelectorAll('[data-panel]').forEach(function(b){b.onclick=function(){var pv=root.querySelector('[data-panelview="'+b.getAttribute('data-panel')+'"]');if(pv)pv.style.display='flex';};});
  root.querySelectorAll('[data-panelclose]').forEach(function(b){b.onclick=function(){b.closest('[data-panelview]').style.display='none';};});
  root.querySelectorAll('[data-endopen]').forEach(function(b){b.onclick=function(){if(em)em.style.display='flex';};});
  root.querySelectorAll('[data-endcancel]').forEach(function(b){b.onclick=function(){if(em)em.style.display='none';};});
}
function wire(){
  app.querySelectorAll('[data-go]').forEach(function(b){b.onclick=function(){show(b.getAttribute('data-go'));};});
  var call=app.querySelector('.call'); if(call) initCall(call);
  app.querySelectorAll('.dd').forEach(function(d){var btn=d.querySelector('.pill'),menu=d.querySelector('.ddmenu');btn.onclick=function(e){e.stopPropagation();menu.style.display=menu.style.display==='block'?'none':'block';};d.querySelectorAll('.ddopt').forEach(function(o){o.onclick=function(){d.querySelector('.ddlabel').textContent=o.textContent;menu.style.display='none';};});});
}
function show(id){var h=SCREENS[id];if(h===undefined)return;app.innerHTML=h;app.className=(id.indexOf('status')===0||id==='rejoin')?'is-status':'';wire();initBg();if(AUTO[id])setTimeout(function(){show(AUTO[id]);},1300);}
document.addEventListener('click',function(e){app.querySelectorAll('.ddmenu').forEach(function(m){m.style.display='none';});app.querySelectorAll('[data-bgpop]').forEach(function(p){if(!p.contains(e.target))p.style.display='none';});});

function bgApply(sw){var color=sw.getAttribute('data-bg');var grp=sw.closest('.bg-sws');if(grp){grp.querySelectorAll('.bg-sw').forEach(function(x){x.classList.toggle('on',x===sw);});}var node=sw,t=null;while(node&&node!==document.body){t=node.querySelector('.pv,.cself,.bigcam,.dk-preview,.pip,.dk-self');if(t)break;node=node.parentElement;}if(t)t.style.background=color;}
function initBg(){app.querySelectorAll('.bg-sws').forEach(function(grp){var on=grp.querySelector('.bg-sw.on')||grp.querySelector('.bg-sw');if(on)bgApply(on);});}
document.addEventListener('click',function(e){var sw=e.target.closest&&e.target.closest('.bg-sw');if(sw)bgApply(sw);});
document.title=START+' - JobFairX';
show(START);
</script></body></html>
