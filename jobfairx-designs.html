<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JobFairX Designs</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;font-family:Inter,sans-serif;background:#0f172a;}
  .hubbar{position:fixed;top:0;left:0;right:0;height:56px;background:#0f172a;display:flex;align-items:center;gap:20px;padding:0 20px;z-index:10;border-bottom:1px solid #1e293b;}
  .hublogo{color:#fff;font-weight:800;font-size:15px;letter-spacing:-.01em;}
  .segs{display:flex;gap:6px;background:#1e293b;padding:4px;border-radius:10px;}
  .segs button{border:none;background:transparent;color:#94a3b8;font-family:inherit;font-size:13.5px;font-weight:700;padding:8px 16px;border-radius:7px;cursor:pointer;}
  .segs button.on{background:#2563eb;color:#fff;}
  .segs button:hover:not(.on){color:#e2e8f0;}
  .hint{margin-left:auto;color:#64748b;font-size:12px;}
  iframe{position:fixed;top:56px;left:0;right:0;bottom:0;width:100%;height:calc(100% - 56px);border:none;background:#fff;}
</style>
</head>
<body>
  <div class="hubbar">
    <span class="hublogo">JobFairX Designs</span>
    <div class="segs">
      <button data-src="nav-mockup.html">Header</button>
      <button data-src="howitworks-mockup.html" class="on">How it works</button>
      <button data-src="jobseeker-dashboard-pills.html">Dashboard</button>
      <button data-src="interview-flow.html">Interview flow</button>
    </div>
    <span class="hint">On the Dashboard, use the "Demo states" button (bottom-left) to flip through every status.</span>
  </div>
  <iframe id="stage" src="howitworks-mockup.html" title="design"></iframe>
  <script>
    var segs=document.querySelectorAll('.segs button');
    segs.forEach(function(b){ b.onclick=function(){
      segs.forEach(function(x){ x.classList.toggle('on', x===b); });
      document.getElementById('stage').src=b.getAttribute('data-src');
    };});
  </script>
</body>
</html>
