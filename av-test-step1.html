<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allow Microphone Access - JobFairX</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: #fff; color: #2d2d2d; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; -webkit-font-smoothing: antialiased; }

.container {
  max-width: 600px;
  width: 100%;
  padding: 40px 32px;
  text-align: center;
}

h1 {
  font-size: 28px;
  font-weight: 800;
  color: #2d2d2d;
  line-height: 1.3;
  margin-bottom: 40px;
}

.illustration {
  width: 320px;
  height: 240px;
  margin: 0 auto 40px;
}

.description {
  font-size: 16px;
  color: #595959;
  line-height: 1.6;
  margin-bottom: 60px;
}

.btn-give-access {
  display: inline-block;
  background: #2557a7;
  color: #fff;
  font-size: 16px;
  font-weight: 700;
  padding: 14px 32px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s;
  float: right;
}
.btn-give-access:hover { background: #1a4080; }

.footer-link {
  margin-top: 80px;
  font-size: 13px;
  color: #2557a7;
  text-decoration: underline;
  cursor: pointer;
}
</style>
</head>
<body>

<div class="container">
  <h1>To join the interview, allow microphone access</h1>

  <!-- Laptop illustration with checklist -->
  <svg class="illustration" viewBox="0 0 320 240" fill="none">
    <!-- Background blob -->
    <ellipse cx="160" cy="140" rx="120" ry="100" fill="#f5deb3" opacity="0.35"/>
    <ellipse cx="140" cy="150" rx="90" ry="80" fill="#f5deb3" opacity="0.25"/>

    <!-- Laptop body -->
    <rect x="60" y="50" width="200" height="130" rx="8" fill="#3a6b7c"/>
    <!-- Screen bezel -->
    <rect x="68" y="56" width="184" height="116" rx="4" fill="#c8dae4"/>
    <!-- Screen -->
    <rect x="74" y="62" width="172" height="104" rx="2" fill="#dde8f0"/>

    <!-- Camera dot -->
    <circle cx="160" cy="53" r="2.5" fill="#5a8a9a"/>

    <!-- Checklist on screen -->
    <rect x="100" y="80" width="120" height="70" rx="6" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>

    <!-- Camera icon -->
    <rect x="112" y="90" width="16" height="11" rx="2" fill="#3a6b7c"/>
    <polygon points="128,91 135,95.5 128,100" fill="#3a6b7c"/>
    <!-- Camera text lines -->
    <rect x="140" y="91" width="60" height="4" rx="2" fill="#c8c8c8"/>
    <rect x="140" y="98" width="40" height="4" rx="2" fill="#d8d8d8"/>

    <!-- Microphone icon -->
    <rect x="115" y="110" width="8" height="14" rx="4" fill="#3a6b7c"/>
    <path d="M112 120 C112 126 124 126 124 120" stroke="#3a6b7c" stroke-width="1.5" fill="none"/>
    <rect x="118" y="125" width="2" height="4" fill="#3a6b7c"/>
    <!-- Mic text lines -->
    <rect x="140" y="113" width="60" height="4" rx="2" fill="#c8c8c8"/>
    <rect x="140" y="120" width="45" height="4" rx="2" fill="#d8d8d8"/>

    <!-- Checkmark -->
    <rect x="112" y="134" width="18" height="14" rx="3" fill="#2e7d32"/>
    <polyline points="116,141 120,145 126,137" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Laptop base -->
    <rect x="45" y="180" width="230" height="8" rx="4" fill="#3a6b7c"/>
    <rect x="130" y="176" width="60" height="4" rx="2" fill="#5a8a9a"/>
  </svg>

  <p class="description">For others to hear you, your browser will request access to your microphone</p>

  <button class="btn-give-access" onclick="window.location.href='av-test-step2.html'">Give access</button>
</div>

</body>
</html>
