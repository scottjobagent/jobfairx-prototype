<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading Lobby - JobFairX</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: #fff; -webkit-font-smoothing: antialiased; }
.page-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.3s ease; }
.page-loader.fade-out { opacity: 0; pointer-events: none; }
.page-loader-spinner { width: 44px; height: 44px; border: 4px solid #e5e7eb; border-top-color: #0044B3; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.page-loader-text { margin-top: 16px; font-size: 16px; font-weight: 500; color: #595959; }
.loaded { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
.loaded.visible { display: flex; }
.loaded svg { width: 56px; height: 56px; color: #16a34a; margin-bottom: 16px; }
.loaded h2 { font-size: 22px; font-weight: 700; color: #2d2d2d; margin-bottom: 8px; }
.loaded p { font-size: 15px; color: #595959; margin-bottom: 24px; }
.loaded a { font-size: 14px; color: #0044B3; font-weight: 600; text-decoration: none; }
.loaded a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="page-loader" id="pageLoader">
  <div class="page-loader-spinner"></div>
  <div class="page-loader-text">Loading event lobby...</div>
</div>

<div class="loaded" id="loadedState">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
  <h2>Lobby ready</h2>
  <p>Redirecting to your event lobby...</p>
  <a href="lobby-v3.html">Go to lobby</a>
</div>

<script>
setTimeout(function() {
  var loader = document.getElementById('pageLoader');
  loader.classList.add('fade-out');
  setTimeout(function() {
    loader.style.display = 'none';
    document.getElementById('loadedState').classList.add('visible');
  }, 300);
}, 3000);
</script>

</body>
</html>
