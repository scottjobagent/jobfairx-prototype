<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading your interview · JobFairX</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body { font-family:'Noto Sans', -apple-system, BlinkMacSystemFont, sans-serif; background:#fff; color:#2d2d2d; -webkit-font-smoothing:antialiased; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:24px; }

  .brand { font-size:20px; font-weight:700; color:#0044B3; letter-spacing:-.2px; margin-bottom:44px; }

  .spin-wrap { position:relative; width:76px; height:76px; margin-bottom:26px; }
  .ring { position:absolute; inset:0; border:4px solid #e8eefb; border-top-color:#0044B3; border-radius:50%; animation:spin .9s linear infinite; }
  .cam { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:28px; height:28px; stroke:#0044B3; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; animation:pulse 1.6s ease-in-out infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes pulse { 0%,100% { opacity:.55; } 50% { opacity:1; } }

  h1 { font-size:19px; font-weight:700; color:#2d2d2d; }
  p { font-size:14.5px; color:#767676; line-height:1.55; margin-top:8px; max-width:300px; }

  .dots { display:inline-block; width:1.2em; text-align:left; }
  .dots::after { content:''; animation:dots 1.4s steps(4,end) infinite; }
  @keyframes dots { 0%{content:'';} 25%{content:'.';} 50%{content:'..';} 75%{content:'...';} 100%{content:'';} }
</style>
</head>
<body>
  <div class="brand">JobFairX</div>

  <div class="spin-wrap">
    <div class="ring"></div>
    <svg class="cam" viewBox="0 0 24 24"><rect x="2" y="6" width="13" height="12" rx="2"/><path d="M22 8.5l-7 4 7 4v-8z"/></svg>
  </div>

  <h1>Loading your interview experience<span class="dots"></span></h1>
  <p>Getting your video and audio ready. This only takes a moment.</p>
</body>
</html>
