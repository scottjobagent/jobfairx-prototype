<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get ready · JobFairX</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body { font-family:'Noto Sans', -apple-system, BlinkMacSystemFont, sans-serif; background:#f3f2ef; color:#2d2d2d; -webkit-font-smoothing:antialiased; display:flex; flex-direction:column; }
  .topbar { height:60px; background:#fff; border-bottom:1px solid #d4d2d0; display:flex; align-items:center; justify-content:space-between; padding:0 32px; flex-shrink:0; }
  .topbar .brand { font-size:19px; font-weight:700; color:#0044B3; }
  .topbar .meta { font-size:14px; color:#767676; }
  .stage { flex:1; display:flex; align-items:center; justify-content:center; padding:40px; }
  .green { display:flex; gap:40px; align-items:center; width:100%; max-width:1040px; }
  .gleft { flex:1.5; min-width:0; display:flex; flex-direction:column; }
  .gright { flex:1; min-width:0; }
  .preview { width:100%; aspect-ratio:16/9; background:#20242c; border-radius:16px; position:relative; display:flex; align-items:center; justify-content:center; }
  .preview .av { width:96px; height:96px; border-radius:50%; background:#3a4150; color:#cdd5e2; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:32px; }
  .preview .tag { position:absolute; left:16px; bottom:16px; background:rgba(0,0,0,.5); color:#fff; font-size:13px; font-weight:600; padding:5px 12px; border-radius:7px; }
  .preview .eq { position:absolute; right:16px; bottom:18px; display:flex; align-items:flex-end; gap:3px; height:20px; } .preview .eq i { width:4px; background:#4ade80; border-radius:2px; animation:eq 1s ease-in-out infinite; } .preview .eq i:nth-child(1){height:40%}.preview .eq i:nth-child(2){height:80%;animation-delay:.1s}.preview .eq i:nth-child(3){height:100%;animation-delay:.2s}.preview .eq i:nth-child(4){height:60%;animation-delay:.3s}
  @keyframes eq { 0%,100%{transform:scaleY(.5)} 50%{transform:scaleY(1)} }
  .pv-ctrls { position:absolute; left:50%; bottom:16px; transform:translateX(-50%); display:flex; gap:12px; }
  .pv-btn { width:48px; height:48px; border-radius:50%; background:rgba(255,255,255,.16); border:1px solid rgba(255,255,255,.28); display:flex; align-items:center; justify-content:center; cursor:pointer; } .pv-btn svg { width:20px; height:20px; stroke:#fff; fill:none; stroke-width:2; }
  .devpills { display:flex; gap:12px; margin-top:16px; justify-content:center; flex-wrap:wrap; }
  .pill { display:inline-flex; align-items:center; gap:8px; border:1px solid #d4d2d0; border-radius:22px; padding:10px 16px; font-size:14px; color:#2d2d2d; background:#fff; } .pill svg { width:16px; height:16px; stroke:#767676; fill:none; stroke-width:2; }
  .gright h1 { font-size:28px; font-weight:700; color:#2d2d2d; }
  .gright p { font-size:16px; color:#767676; margin-top:10px; line-height:1.5; }
  .btn { display:flex; width:100%; align-items:center; justify-content:center; background:#0044B3; color:#fff; border:none; border-radius:9px; padding:15px; font-size:16px; font-weight:700; font-family:inherit; cursor:pointer; margin-top:22px; } .btn:hover { background:#003399; }
  @media (max-width:820px){ .green{ flex-direction:column; gap:22px; } .gright{ width:100%; text-align:center; } }
</style>
</head>
<body>
  <div class="topbar"><span class="brand">JobFairX</span><span class="meta">Registered Nurse · Baylor Scott &amp; White</span></div>
  <div class="stage">
    <div class="green">
      <div class="gleft">
        <div class="preview">
          <div class="av">B</div>
          <span class="tag">You</span>
          <span class="eq"><i></i><i></i><i></i><i></i></span>
          <div class="pv-ctrls">
            <button class="pv-btn"><svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0M12 17v4"/></svg></button>
            <button class="pv-btn"><svg viewBox="0 0 24 24"><rect x="2" y="6" width="13" height="12" rx="2"/><path d="M22 8.5l-7 4 7 4v-8z"/></svg></button>
          </div>
        </div>
        <div class="devpills">
          <div class="pill"><svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0M12 17v4"/></svg>iPhone Mic<svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></div>
          <div class="pill"><svg viewBox="0 0 24 24"><rect x="2" y="6" width="13" height="12" rx="2"/><path d="M22 8.5l-7 4 7 4v-8z"/></svg>Front Camera<svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></div>
        </div>
      </div>
      <div class="gright">
        <h1>Ready to join?</h1>
        <p>Check your camera and mic, then continue to your interview.</p>
        <button class="btn">Continue</button>
      </div>
    </div>
  </div>
</body>
</html>
