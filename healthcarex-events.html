<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HealthcareX — Healthcare Job Fairs in 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #0F8E57;
    --green-dark: #0a6b41;
    --green-darker: #075233;
    --green-tint: #E8F5EE;
    --green-tint-2: #f3faf6;
    --ink: #0f1419;
    --ink-2: #1a1a1a;
    --muted: #4b5563;
    --muted-2: #6b7280;
    --line: #e5e7eb;
    --line-soft: #f0eeea;
    --bg-page: #f3f5f7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-page); color: var(--ink-2);
    -webkit-font-smoothing: antialiased; line-height: 1.55;
  }
  .container { max-width: 1280px; margin: 0 auto; padding: 0 32px; }

  /* HEADER (same as landing) */
  .site-header { border-bottom: 1px solid var(--line); background: rgba(255,255,255,0.92); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 50; }
  .header-inner { display: flex; align-items: center; justify-content: space-between; padding: 18px 0; }
  .logo { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 800; color: var(--ink); letter-spacing: -0.02em; text-decoration: none; }
  .logo-mark { width: 32px; height: 32px; border-radius: 8px; background: var(--green); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 900; font-size: 18px; letter-spacing: -0.02em; }
  .logo-x { color: var(--green); }
  .nav { display: flex; gap: 28px; align-items: center; }
  .nav a { color: var(--ink-2); text-decoration: none; font-size: 14px; font-weight: 600; }
  .nav a:hover { color: var(--green); }
  .nav a.active { color: var(--green-dark); }
  .nav-cta { background: var(--ink); color: #fff !important; padding: 9px 18px; border-radius: 8px; font-size: 14px; font-weight: 700; }
  .nav-cta:hover { background: var(--green); }

  /* PAGE */
  .page { padding: 60px 0 96px; }
  .page-head { margin-bottom: 32px; }
  .page-title { font-size: 44px; font-weight: 800; letter-spacing: -0.025em; color: var(--ink); line-height: 1.1; }

  /* FILTER BAR */
  .filter-bar { display: grid; grid-template-columns: 1fr 280px; gap: 18px; margin-bottom: 36px; }
  .search-wrap { position: relative; }
  .search-wrap input {
    width: 100%; height: 64px;
    padding: 0 22px 0 58px;
    border-radius: 14px; border: 1px solid var(--line);
    background: #fff; font-size: 16px; font-weight: 500; color: var(--ink-2);
    font-family: inherit;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search-wrap input:focus { outline: none; border-color: var(--green); box-shadow: 0 0 0 4px rgba(15,142,87,0.12); }
  .search-wrap input::placeholder { color: var(--muted-2); }
  .search-icon { position: absolute; left: 22px; top: 50%; transform: translateY(-50%); color: var(--muted-2); pointer-events: none; }
  .filter-select-wrap { position: relative; }
  .filter-select {
    width: 100%; height: 64px;
    padding: 0 50px 0 22px;
    border-radius: 14px; border: 1px solid var(--line);
    background: #fff; font-size: 16px; font-weight: 600; color: var(--ink-2);
    font-family: inherit;
    appearance: none; -webkit-appearance: none;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .filter-select:focus { outline: none; border-color: var(--green); box-shadow: 0 0 0 4px rgba(15,142,87,0.12); }
  .filter-chevron { position: absolute; right: 22px; top: 50%; transform: translateY(-50%); color: var(--muted-2); pointer-events: none; }

  /* TABLE */
  .table-head {
    display: grid; grid-template-columns: 180px 1fr 200px 180px;
    gap: 24px; padding: 0 32px; margin-bottom: 14px;
    font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted-2);
  }
  .events-list { display: flex; flex-direction: column; gap: 14px; }
  .event-row {
    display: grid; grid-template-columns: 180px 1fr 200px 180px;
    gap: 24px; align-items: center;
    background: #fff; border-radius: 16px; padding: 26px 32px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .event-row:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(15,142,87,0.08);
  }
  .event-date {
    font-size: 15px; font-weight: 600; color: var(--muted);
  }
  .event-title {
    font-size: 17px; font-weight: 800; color: var(--ink-2); letter-spacing: -0.01em;
    line-height: 1.4;
  }
  .event-type-pill {
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--green-tint); color: var(--green-dark);
    padding: 8px 18px; border-radius: 999px;
    font-size: 13px; font-weight: 700; letter-spacing: 0.02em;
    border: 1px solid rgba(15,142,87,0.25);
    width: fit-content;
  }
  .request-btn {
    background: var(--green); color: #fff;
    padding: 13px 24px; border-radius: 10px;
    font-size: 14px; font-weight: 700;
    text-decoration: none; text-align: center;
    border: none; cursor: pointer;
    transition: background 0.15s;
    font-family: inherit;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  }
  .request-btn:hover { background: var(--green-dark); }

  /* FOOTER */
  .site-footer {
    padding: 36px 0; border-top: 1px solid var(--line); background: #fff;
    font-size: 13px; color: var(--muted-2); text-align: center;
  }
  .site-footer a { color: var(--muted-2); text-decoration: none; }
  .site-footer a:hover { color: var(--green); }

  /* EMPTY STATE */
  .empty-state {
    background: #fff; border-radius: 16px; padding: 60px 32px; text-align: center;
    color: var(--muted); font-size: 16px;
  }

  /* RESPONSIVE */
  @media (max-width: 880px) {
    .page-title { font-size: 30px; }
    .filter-bar { grid-template-columns: 1fr; }
    .table-head { display: none; }
    .event-row {
      grid-template-columns: 1fr;
      gap: 14px; padding: 22px;
    }
    .event-date { font-size: 13px; color: var(--green-dark); font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
    .event-title { font-size: 16px; }
    .request-btn { width: 100%; padding: 15px; font-size: 15px; }
    .nav a:not(.nav-cta) { display: none; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="healthcarex-landing-mockup.html" class="logo">
      <span class="logo-mark">H</span>
      <span>Healthcare<span class="logo-x">X</span></span>
    </a>
    <nav class="nav">
      <a href="healthcarex-events.html" class="active">Upcoming events</a>
      <a href="#">For employers</a>
      <a href="#" class="nav-cta">Request invite</a>
    </nav>
  </div>
</header>

<main class="page">
  <div class="container">

    <div class="page-head">
      <h1 class="page-title">Healthcare Job Fairs in 2026</h1>
    </div>

    <div class="filter-bar">
      <div class="search-wrap">
        <svg class="search-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Search by city (e.g. Dallas, TX)" id="citySearch" oninput="filterEvents()">
      </div>
      <div class="filter-select-wrap">
        <select class="filter-select" id="typeFilter" onchange="filterEvents()">
          <option value="Healthcare" selected>Healthcare</option>
          <option value="All">All types</option>
          <option value="Entry-Level">Entry-Level</option>
          <option value="Veterans">Veterans</option>
          <option value="Diversity">Diversity</option>
          <option value="Technology">Technology</option>
        </select>
        <svg class="filter-chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>

    <div class="table-head">
      <div>Date</div>
      <div>City</div>
      <div>Event Type</div>
      <div></div>
    </div>

    <div class="events-list" id="eventsList">
      <!-- Events injected by JS for filter support -->
    </div>

    <div class="empty-state" id="emptyState" style="display:none;">
      No job fairs match your search. Try a different city or event type.
    </div>

  </div>
</main>

<footer class="site-footer">
  <div class="container">
    © 2026 HealthcareX · <a href="mailto:eventbrite@healthcarex.co">eventbrite@healthcarex.co</a>
  </div>
</footer>

<script>
const EVENTS = [
  { date: "Jun 9, 2026",  city: "Los Angeles, CA",   type: "Healthcare" },
  { date: "Jun 18, 2026", city: "Dallas, TX",        type: "Healthcare" },
  { date: "Jun 24, 2026", city: "Seattle, WA",       type: "Healthcare" },
  { date: "Jul 7, 2026",  city: "Oklahoma City, OK", type: "Healthcare" },
  { date: "Jul 16, 2026", city: "Houston, TX",       type: "Healthcare" },
  { date: "Jul 22, 2026", city: "Atlanta, GA",       type: "Healthcare" },
  { date: "Jul 29, 2026", city: "Boston, MA",        type: "Healthcare" },
  { date: "Aug 6, 2026",  city: "Chicago, IL",       type: "Healthcare" },
  { date: "Aug 11, 2026", city: "Phoenix, AZ",       type: "Healthcare" },
  { date: "Aug 19, 2026", city: "Philadelphia, PA",  type: "Healthcare" },
  { date: "Aug 27, 2026", city: "New York, NY",      type: "Healthcare" },
  { date: "Sep 2, 2026",  city: "Miami, FL",         type: "Healthcare" },
  { date: "Sep 10, 2026", city: "Minneapolis, MN",   type: "Healthcare" },
  { date: "Sep 16, 2026", city: "San Diego, CA",     type: "Healthcare" },
  { date: "Sep 22, 2026", city: "Denver, CO",        type: "Healthcare" },
  { date: "Sep 30, 2026", city: "Nashville, TN",     type: "Healthcare" },
  { date: "Oct 7, 2026",  city: "Charlotte, NC",     type: "Healthcare" },
  { date: "Oct 14, 2026", city: "Tampa, FL",         type: "Healthcare" },
  { date: "Oct 21, 2026", city: "Columbus, OH",      type: "Healthcare" },
  { date: "Oct 28, 2026", city: "Indianapolis, IN",  type: "Healthcare" },
];

function renderEvents(list) {
  const root = document.getElementById('eventsList');
  const empty = document.getElementById('emptyState');
  if (!list.length) {
    root.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  root.innerHTML = list.map(e => `
    <div class="event-row">
      <div class="event-date">${e.date}</div>
      <div class="event-title">${e.city} ${e.type} Job Fair</div>
      <div><span class="event-type-pill">${e.type}</span></div>
      <a href="healthcarex-landing-mockup.html#" class="request-btn">Request Invite</a>
    </div>
  `).join('');
}

function filterEvents() {
  const q = document.getElementById('citySearch').value.trim().toLowerCase();
  const type = document.getElementById('typeFilter').value;
  const filtered = EVENTS.filter(e => {
    const matchCity = !q || e.city.toLowerCase().includes(q);
    const matchType = type === 'All' || e.type === type;
    return matchCity && matchType;
  });
  renderEvents(filtered);
}

renderEvents(EVENTS);
</script>

</body>
</html>
